project:
  type: website
  output-dir: docs
  resources:
    - "images/**"

website:
  title: ""
  site-url: "https://example.com"

format:
  html:
    theme: none
    minimal: true
    smart: false
    anchor-sections: false
    page-layout: full
    css: styles.css
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    include-after-body:
      text: |
        <script>
        function toggleNav(btn) {
          var navBar = document.querySelector('.nav-bar');
          if (!navBar) return;
          var open = navBar.classList.toggle('open');
          btn.setAttribute('aria-expanded', String(open));
          if (!document.querySelector('.first-view')) {
            document.body.classList.toggle('nav-open', open);
          }
        }
        document.addEventListener('click', function(e) {
          if (e.target.closest('.nav-bar') || e.target.closest('.hdr-nav')) return;
          if (document.querySelector('.nav-item.active')) return;
          var navBar = document.querySelector('.nav-bar');
          if (navBar && navBar.classList.contains('open')) {
            navBar.classList.remove('open');
            document.body.classList.remove('nav-open');
          }
        });
        document.addEventListener('DOMContentLoaded', function() {
          if (document.querySelector('.nav-item.active')) {
            var navBar = document.querySelector('.nav-bar');
            if (navBar) {
              navBar.classList.add('open');
              document.body.classList.add('nav-open');
            }
          }
        });
        </script>
